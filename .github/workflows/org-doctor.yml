name: org-doctor

# Ecosystem conformance gate. Runs the local-dev tools (org_doctor, aggregate_docs)
# in CI by checking norikit out into a subdir and cloning every sibling org repo
# alongside it — exactly the layout the tools expect (ORG_ROOT = the workspace).
#
#  - On PRs touching the framework surface: fail the check if not conformant.
#  - On a weekly schedule (and manual dispatch): report drift, refresh the
#    ecosystem/ mirror, open a mechanical PR if it changed, and file/refresh a
#    tracking issue if conformance fails.

on:
  pull_request:
    paths:
      - "ai-docs/**"
      - "template/**"
      - "tools/**"
      - "README.md"
      - ".github/workflows/org-doctor.yml"
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: org-doctor-${{ github.ref }}
  cancel-in-progress: true

env:
  # Prefer the PAT (re-triggers CI on bot PRs so auto-merge completes); fall back
  # to the default token (opens PRs but they need a manual merge).
  GH_TOKEN: ${{ secrets.ORG_AUTOMATION_TOKEN || github.token }}

jobs:
  doctor:
    runs-on: ubuntu-latest
    steps:
      - name: Check out norikit (into ./norikit so siblings sit beside it)
        uses: actions/checkout@v4
        with:
          path: norikit
          token: ${{ secrets.ORG_AUTOMATION_TOKEN || github.token }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Clone sibling org repos (all PUBLIC)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd "$GITHUB_WORKSPACE"
          for name in $(gh repo list norikit --limit 100 --json name -q '.[].name'); do
            [ "$name" = "norikit" ] && continue
            git clone --quiet --depth 1 "https://github.com/norikit/$name.git" "$name"
          done
          echo "Workspace repos:" && ls -d */

      - name: Run org-doctor
        id: doctor
        run: |
          cd "$GITHUB_WORKSPACE"
          set -o pipefail
          python3 norikit/tools/org_doctor.py 2>&1 | tee report.txt

      # ---- schedule / manual only: keep the ecosystem mirror fresh ------------
      - name: Refresh ecosystem aggregate
        if: always() && github.event_name != 'pull_request'
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 norikit/tools/aggregate_docs.py

      - name: Open PR if the mirror drifted
        if: always() && github.event_name != 'pull_request'
        run: |
          cd "$GITHUB_WORKSPACE/norikit"
          if [ -z "$(git status --porcelain ecosystem)" ]; then
            echo "ecosystem mirror already current — nothing to do."
            exit 0
          fi
          BRANCH="chore/aggregate-refresh-${{ github.run_id }}"
          git config user.name  "norikit-bot"
          git config user.email "noreply@github.com"
          git switch -c "$BRANCH"
          git add ecosystem
          git commit -m "chore(ecosystem): refresh aggregate mirror [automated]"
          git push -u origin "$BRANCH"
          gh pr create --fill \
            --title "chore(ecosystem): refresh aggregate mirror" \
            --body "Automated mirror refresh by the scheduled \`org-doctor\` run. Mechanical, generated by \`tools/aggregate_docs.py\` — safe to squash-merge on green." \
          && gh pr merge --auto --squash "$BRANCH" || true

      # ---- failure surfacing --------------------------------------------------
      - name: File / refresh drift issue (schedule only)
        if: failure() && github.event_name == 'schedule'
        run: |
          cd "$GITHUB_WORKSPACE/norikit"
          TITLE="org-doctor: ecosystem conformance drift"
          BODY=$'The scheduled `org-doctor` run reported drift:\n\n```\n'"$(cat ../report.txt)"$'\n```\n\nRun `python3 tools/org_doctor.py` locally to reproduce.'
          EXISTING=$(gh issue list --state open --search "$TITLE in:title" --json number -q '.[0].number')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label chore || gh issue create --title "$TITLE" --body "$BODY"
          fi
